name: Account lifecycle freshness (hourly)

# Runs every hour to keep the account lifecycle fresh so a mailbox that Instantly
# re-enables on its own (e.g. once a 550 daily-limit throttle clears) is noticed
# and promoted within the hour instead of waiting up to a week for the placement
# cron. Three steps, in order (each is a fire-and-forget 202 — they do NOT block
# each other; ordering is best-effort, and every step is idempotent so a race is
# harmless and self-corrects next hour):
#   1. /internal/audit/accounts-sync — snapshot GET /accounts → bronze/silver +
#      run reconcileLifecycle. Refreshes health/status and flips any account whose
#      state changed (a re-enabled account -> in_production with a 45/5 PATCH; a
#      regressed one -> in_recovery). This is the step that promotes an
#      auto-reactivated mailbox back into the send pool.
#   2. /internal/audit/lifecycle-limits-sync — idempotently enforce warmup +
#      campaign daily_limit to each account's CURRENT lifecycle target
#      (in_production 45/5, in_recovery 20/30). Catches an account whose limits
#      Instantly reset on its own reactivation (magnolia pattern) within the hour,
#      not the day. Only PATCHes drifting fields.
#   3. /internal/audit/reactivate-accounts — resume genuinely-paused, healthy-again
#      accounts (Health 100 + 100% inbox + deactivated ≥24h + reason NOT a 550
#      throttle / OAuth -1 / autofix_failed). Gated behind REACTIVATE_ACCOUNTS_ENABLED
#      — a 409 (disarmed) is TOLERATED. The 24h gate makes the account count
#      trivially small, so hourly is safe (no tight nudge loop).
#
# Required secrets (same as reconcile-cron):
#   INSTANTLY_SERVICE_URL  — production URL (e.g. https://instantly.example.com)
#   INSTANTLY_SERVICE_API_KEY — service API key for /internal/* routes
#
# Scheduled runs fire from the DEFAULT branch (main) only. Manually trigger via
# the workflow_dispatch button on the GitHub Actions page.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: POST /internal/audit/accounts-sync
        env:
          SERVICE_URL: ${{ secrets.INSTANTLY_SERVICE_URL }}
          API_KEY: ${{ secrets.INSTANTLY_SERVICE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL}" ] || [ -z "${API_KEY}" ]; then
            echo "Missing INSTANTLY_SERVICE_URL or INSTANTLY_SERVICE_API_KEY secret"
            exit 1
          fi

          # Snapshot accounts -> bronze/silver + reconcileLifecycle. Runs in the
          # background (202); verify via Railway logs (`accounts-sync: done`).
          response_file=$(mktemp)
          status=$(curl -sS -o "${response_file}" -w "%{http_code}" \
            -X POST \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${SERVICE_URL}/internal/audit/accounts-sync")

          echo "HTTP ${status}"
          cat "${response_file}"
          echo

          if [ "${status}" != "202" ] && [ "${status}" != "200" ]; then
            echo "accounts-sync dispatch failed with HTTP ${status}"
            exit 1
          fi

      - name: POST /internal/audit/lifecycle-limits-sync
        env:
          SERVICE_URL: ${{ secrets.INSTANTLY_SERVICE_URL }}
          API_KEY: ${{ secrets.INSTANTLY_SERVICE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL}" ] || [ -z "${API_KEY}" ]; then
            echo "Missing INSTANTLY_SERVICE_URL or INSTANTLY_SERVICE_API_KEY secret"
            exit 1
          fi

          # Enforce warmup + daily_limit to each account's lifecycle target.
          # Idempotent (only PATCHes drift). Background (202); log
          # `lifecycle-limits-sync: done`.
          response_file=$(mktemp)
          status=$(curl -sS -o "${response_file}" -w "%{http_code}" \
            -X POST \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${SERVICE_URL}/internal/audit/lifecycle-limits-sync")

          echo "HTTP ${status}"
          cat "${response_file}"
          echo

          if [ "${status}" != "202" ] && [ "${status}" != "200" ]; then
            echo "lifecycle-limits-sync dispatch failed with HTTP ${status}"
            exit 1
          fi

      - name: POST /internal/audit/reactivate-accounts
        env:
          SERVICE_URL: ${{ secrets.INSTANTLY_SERVICE_URL }}
          API_KEY: ${{ secrets.INSTANTLY_SERVICE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL}" ] || [ -z "${API_KEY}" ]; then
            echo "Missing INSTANTLY_SERVICE_URL or INSTANTLY_SERVICE_API_KEY secret"
            exit 1
          fi

          # Resume genuinely-paused, healthy-again accounts. Reason-aware (skips
          # 550 throttle / OAuth -1 / autofix_failed). Gated behind
          # REACTIVATE_ACCOUNTS_ENABLED — a 409 (disarmed) is TOLERATED. Background
          # (202); log `reactivate-accounts: done`.
          response_file=$(mktemp)
          status=$(curl -sS -o "${response_file}" -w "%{http_code}" \
            -X POST \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${SERVICE_URL}/internal/audit/reactivate-accounts")

          echo "HTTP ${status}"
          cat "${response_file}"
          echo

          # 409 = REACTIVATE_ACCOUNTS_ENABLED off (dormant until armed) — tolerated.
          if [ "${status}" != "202" ] && [ "${status}" != "200" ] && [ "${status}" != "409" ]; then
            echo "reactivate-accounts dispatch failed with HTTP ${status}"
            exit 1
          fi
