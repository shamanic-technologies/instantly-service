name: Retry stuck campaigns (daily)

# Runs once a day (02:00 UTC) to detect campaigns stuck in
# `delivery_status='contacted'` for >24h because Instantly refuses to send
# (not_sending_status set). Pauses the Instantly campaign, writes the
# observed not_sending_status onto the row, cancels actual+provisioned
# costs (so the customer is refunded), marks `delivery_status='cancelled'`.
# Idempotent — already-cancelled rows fall outside the SELECT.
#
# Per-run cap: 500 oldest rows. Serialized via a Postgres advisory lock so
# overlapping invocations short-circuit instead of double-cancelling.
#
# Required secrets:
#   INSTANTLY_SERVICE_URL  — production URL (e.g. https://instantly.example.com)
#   INSTANTLY_SERVICE_API_KEY — service API key for /internal/* routes
#
# Manually trigger via the workflow_dispatch button on the GitHub Actions page.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  retry-stuck:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: POST /internal/campaigns/retry-stuck
        env:
          SERVICE_URL: ${{ secrets.INSTANTLY_SERVICE_URL }}
          API_KEY: ${{ secrets.INSTANTLY_SERVICE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVICE_URL}" ] || [ -z "${API_KEY}" ]; then
            echo "Missing INSTANTLY_SERVICE_URL or INSTANTLY_SERVICE_API_KEY secret"
            exit 1
          fi

          response_file=$(mktemp)
          status=$(curl -sS -o "${response_file}" -w "%{http_code}" \
            -X POST \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            "${SERVICE_URL}/internal/campaigns/retry-stuck")

          echo "HTTP ${status}"
          cat "${response_file}"
          echo

          # Endpoint returns 202 Accepted and runs the sweep in the background.
          # Verify completion via Railway logs (`retry-stuck: done`).
          if [ "${status}" != "202" ] && [ "${status}" != "200" ]; then
            echo "Retry-stuck dispatch failed with HTTP ${status}"
            exit 1
          fi
